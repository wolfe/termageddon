<div class="container mx-auto mt-8">
  <h2 class="text-2xl font-semibold mb-4">Terms</h2>
  <div *ngIf="terms$ | async as terms; else loading">
    <table class="min-w-full bg-white border border-gray-200">
      <thead>
        <tr>
          <th class="py-2 px-4 border-b">Term</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let term of terms" class="hover:bg-gray-100">
          <td class="py-2 px-4 border-b">{{ term.text }}</td>
        </tr>
      </tbody>
    </table>
    <div *ngIf="terms.length === 0" class="mt-4 text-center text-gray-500">
      No terms found.
    </div>
  </div>
  <ng-template #loading>
    <p class="text-center text-gray-500">Loading terms...</p>
  </ng-template>
</div>
