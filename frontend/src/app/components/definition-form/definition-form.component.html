<div class="container mx-auto mt-8 max-w-2xl">
  <h2 class="text-2xl font-semibold mb-4">Propose a New Definition</h2>
  <form (ngSubmit)="onSubmit()" #definitionForm="ngForm" class="bg-white p-6 rounded-lg shadow-md">
    <div class="mb-4">
      <label for="term" class="block text-gray-700 font-bold mb-2">Term</label>
      <input type="text" id="term" name="term" [(ngModel)]="model.term" required
             class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div class="mb-4">
      <label for="domain" class="block text-gray-700 font-bold mb-2">Domain</label>
      <input type="text" id="domain" name="domain" [(ngModel)]="model.domain" required
             class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div class="mb-6">
      <label for="definition" class="block text-gray-700 font-bold mb-2">Definition</label>
      <textarea id="definition" name="definition" [(ngModel)]="model.definition_text" required
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                rows="6"></textarea>
      <!-- In a real implementation, this would be a rich text editor -->
    </div>

    <div class="flex items-center justify-between">
      <button type="submit" [disabled]="!definitionForm.form.valid"
              class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline disabled:opacity-50">
        Submit for Approval
      </button>
      <a routerLink="/definitions" class="text-gray-600 hover:text-gray-800">Cancel</a>
    </div>
  </form>
</div>
