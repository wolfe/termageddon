<form (ngSubmit)="onSubmit()" class="bg-white p-6 rounded-lg shadow-md space-y-4">
  <div>
    <label for="domain-select" class="block text-sm font-medium text-gray-700">Domain</label>
    <select 
      id="domain-select" 
      [(ngModel)]="selectedDomainId" 
      (ngModelChange)="onDomainChange()"
      name="domain"
      required
      class="mt-1 block w-80 pl-3 pr-10 py-2 text-base border-2 border-indigo-200 bg-gray-50 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md"
    >
      <option [ngValue]="null" disabled>Select a domain</option>
      <option *ngFor="let domain of domains" [ngValue]="domain.id">{{ domain.name }}</option>
    </select>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700">Definition</label>
    <editor
      [(ngModel)]="definitionText"
      [init]="editorConfig"
      licenseKey="gpl"
      name="definitionText"
      required
    ></editor>
  </div>

  <div>
    <button 
      type="submit"
      class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
    >
      Submit for Approval
    </button>
  </div>
</form>
