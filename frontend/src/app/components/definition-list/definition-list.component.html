<div class="container mx-auto mt-8">
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-2xl font-semibold">Definitions</h2>
    <a routerLink="/definitions/propose" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
      Propose New Definition
    </a>
  </div>

  <!-- Filtering Controls -->
  <div class="flex items-center space-x-4 mb-4 p-4 bg-gray-100 rounded-lg">
    <div class="flex-grow">
      <label for="search" class="sr-only">Search</label>
      <input #searchInput type="text" id="search" (input)="onFilterChange()"
             class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
             placeholder="Search by term or definition...">
    </div>
    <div>
      <label for="status" class="sr-only">Status</label>
      <select #statusSelect (change)="onFilterChange()" id="status"
              class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="">All Statuses</option>
        <option value="proposed">Proposed</option>
        <option value="approved">Approved</option>
        <option value="rejected">Rejected</option>
      </select>
    </div>
  </div>

  <div *ngIf="response$ | async as response; else loading">
    <table class="min-w-full bg-white border border-gray-200">
      <thead>
        <tr>
          <th class="py-2 px-4 border-b text-left">Term</th>
          <th class="py-2 px-4 border-b text-left">Domain</th>
          <th class="py-2 px-4 border-b text-left">Definition</th>
          <th class="py-2 px-4 border-b text-left">Status</th>
          <th class="py-2 px-4 border-b text-left">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let definition of response.results" class="hover:bg-gray-100">
          <td class="py-2 px-4 border-b">{{ definition.term.text }}</td>
          <td class="py-2 px-4 border-b">{{ definition.domain.name }}</td>
          <td class="py-2 px-4 border-b" [innerHTML]="definition.definition_text"></td>
          <td class="py-2 px-4 border-b">
            <span [ngClass]="{
              'bg-blue-200 text-blue-800': definition.status === 'proposed',
              'bg-green-200 text-green-800': definition.status === 'approved',
              'bg-red-200 text-red-800': definition.status === 'rejected'
            }" class="px-2 py-1 rounded-full text-xs font-semibold">
              {{ definition.status }}
            </span>
          </td>
          <td class="py-2 px-4 border-b">
            <button *ngIf="definition.status === 'proposed'"
                    (click)="approve(definition.id)"
                    class="bg-green-500 hover:bg-green-700 text-white font-bold py-1 px-3 rounded text-xs">
              Approve
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <!-- Pagination Controls -->
    <div class="mt-4 flex justify-between items-center">
      <span class="text-gray-600">Total: {{ response.count }}</span>
      <div>
        <button (click)="loadPage(response.previous)" [disabled]="!response.previous"
                class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded-l disabled:opacity-50 disabled:cursor-not-allowed">
          Previous
        </button>
        <button (click)="loadPage(response.next)" [disabled]="!response.next"
                class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded-r disabled:opacity-50 disabled:cursor-not-allowed">
          Next
        </button>
      </div>
    </div>

    <div *ngIf="response.results.length === 0" class="mt-4 text-center text-gray-500">
      No definitions found.
    </div>
  </div>
  <ng-template #loading>
    <p class="text-center text-gray-500">Loading definitions...</p>
  </ng-template>
</div>
