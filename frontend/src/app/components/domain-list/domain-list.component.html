<div class="container mx-auto mt-8">
  <h2 class="text-2xl font-semibold mb-4">Domains</h2>
  <div *ngIf="domains$ | async as domains; else loading">
    <table class="min-w-full bg-white border border-gray-200">
      <thead>
        <tr>
          <th class="py-2 px-4 border-b">Name</th>
          <th class="py-2 px-4 border-b">Description</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let domain of domains" class="hover:bg-gray-100">
          <td class="py-2 px-4 border-b">{{ domain.name }}</td>
          <td class="py-2 px-4 border-b">{{ domain.description }}</td>
        </tr>
      </tbody>
    </table>
    <div *ngIf="domains.length === 0" class="mt-4 text-center text-gray-500">
      No domains found.
    </div>
  </div>
  <ng-template #loading>
    <p class="text-center text-gray-500">Loading domains...</p>
  </ng-template>
</div>
